name: CI

# Each new commit on a PR cancels any in-flight CI run for the same branch.
# Saves ~2-3× CI minutes during rapid iteration without losing the final-state
# check (the latest commit always completes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    # master = stable line, rust = 2.x alpha line. Both get the same gate, so
    # the release-please release PR (which edits package.json) is lint/test-
    # checked before merge on either line.
    branches: [master, rust]
    paths:
      # Skip docs-only / config-only PRs; perf and parity matter only for code.
      - 'src/**'
      - 'crates/native/**'
      - 'proto/**'
      - 'tests/**'
      - 'scripts/**'
      - 'examples/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.json'
      - 'tsdown.config.ts'
      - '.github/workflows/ci.yml'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - run: bun install --frozen-lockfile

      - run: bun run lint
      - run: bun run format:check
      - run: bun run typecheck

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Caches both the registry (downloaded crates) and the build output.
      # Key includes both the lockfile and a hash of the Rust source so
      # source-only changes still bust the cache and rebuild.
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/native/Cargo.lock', 'crates/native/src/**', 'crates/native/build.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: bun install --frozen-lockfile

      - name: Build native (linux-x64-gnu)
        run: bun run build:native

      - name: Build bundle
        run: bun run build

      # Cache demo fixtures to avoid repeated downloads
      - name: Cache test fixtures
        id: fixture-cache
        uses: actions/cache@v5
        with:
          path: tests/fixtures/*.dem
          key: test-fixtures-v1

      - name: Download test fixtures
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: |
          gh release download test-fixtures/v1 -p "*.dem" -D tests/fixtures/ --repo ${{ github.repository }} || echo "No test fixtures release found, skipping integration tests"
        env:
          GH_TOKEN: ${{ github.token }}

      - run: bun run test
