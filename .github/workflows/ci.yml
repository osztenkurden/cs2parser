name: CI

on:
  pull_request:
    branches: [master]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: bun install --frozen-lockfile

      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/native/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: bun install --frozen-lockfile

      - name: Build native addon (linux-x64-gnu)
        run: npm run build:native

      - run: npm run build

      # Cache demo fixtures to avoid repeated downloads
      - name: Cache test fixtures
        id: fixture-cache
        uses: actions/cache@v5
        with:
          path: tests/fixtures/*.dem
          key: test-fixtures-v1

      - name: Download test fixtures
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: |
          gh release download test-fixtures/v1 -p "*.dem" -D tests/fixtures/ --repo ${{ github.repository }} || echo "No test fixtures release found, skipping integration tests"
        env:
          GH_TOKEN: ${{ github.token }}

      - run: bun run test
