name: Release

# Pipeline:
#   1. `release-please` watches master for conventional commits. When a release
#      is "ready", it opens or updates a release PR. Merging that PR creates a
#      GitHub release + tag + emits `release_created` on the next workflow run.
#   2. On `release_created`, the `build` matrix produces per-triple .node
#      binaries and uploads them as artefacts.
#   3. `publish` downloads every artefact, syncs the new version across the
#      loader + per-triple sub-package + main package manifests, and pushes
#      them to npm. The main `cs2parser` package's `cs2parser-native`
#      dependency picks the matching triple via that loader's
#      `optionalDependencies`.

on:
  push:
    branches: [master]

# Releases are linear: never run two release pipelines for the same ref
# concurrently. `cancel-in-progress: false` ensures a release that's already
# uploading artefacts and publishing to npm can't be killed by the next master
# push — a partial publish (some triples up, others not) would be ugly to
# clean up.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

env:
  APP_NAME: cs2parser-native

defaults:
  run:
    shell: bash

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  build:
    name: build-${{ matrix.settings.target }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: bun run build:native
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: bun run build:native
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: cd crates/native && npx napi build --platform --release --target x86_64-unknown-linux-musl
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
            build: cd crates/native && npx napi build --platform --release --target aarch64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
            build: bun run build:native
          - host: macos-latest
            target: aarch64-apple-darwin
            build: bun run build:native -- --target aarch64-apple-darwin
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ !matrix.settings.docker }}
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust toolchain
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/native/target
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('crates/native/Cargo.lock', 'crates/native/src/**', 'crates/native/build.rs') }}
          restore-keys: |
            ${{ matrix.settings.target }}-cargo-

      - name: Install deps (host)
        if: ${{ !matrix.settings.docker }}
        run: bun install --frozen-lockfile

      - name: Build (host)
        if: ${{ !matrix.settings.docker }}
        run: ${{ matrix.settings.build }}

      - name: Build (docker)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            npm install --ignore-scripts
            ${{ matrix.settings.build }}

      - name: Upload .node artefact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crates/native/${{ env.APP_NAME }}.*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Download all .node artefacts
        uses: actions/download-artifact@v5
        with:
          pattern: bindings-*
          merge-multiple: true
          path: crates/native/

      - name: Move binaries into per-triple sub-package dirs
        run: |
          shopt -s nullglob
          for f in crates/native/${APP_NAME}.*.node; do
            base=$(basename "$f" .node)
            triple=${base#${APP_NAME}.}
            dest=crates/native/npm/$triple/
            if [ -d "$dest" ]; then
              mv "$f" "$dest"
              echo "  $triple ← $f"
            else
              echo "WARNING: no sub-package dir for triple '$triple', leaving $f in place"
            fi
          done

      - name: Sync package versions
        run: bun scripts/sync-package-versions.ts

      - name: Build main bundle
        run: bun run build

      # npm publish defaults to the `latest` dist-tag regardless of whether
      # the version has a `-alpha.N` / `-beta.N` / `-rc.N` suffix. Without an
      # explicit `--tag`, publishing 2.0.0-alpha.0 would point `latest` at the
      # alpha, breaking every `npm install cs2parser` that doesn't pin. Pick
      # the dist-tag from the version's pre-release identifier.
      - name: Determine npm dist-tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-alpha.*) TAG=alpha ;;
            *-beta.*)  TAG=beta ;;
            *-rc.*)    TAG=rc ;;
            *-*)       TAG=next ;;   # any other pre-release identifier
            *)         TAG=latest ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION → dist-tag '$TAG'"

      - name: Publish per-triple sub-packages
        run: |
          for dir in crates/native/npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"*.node >/dev/null 2>&1; then
              echo "publishing $dir"
              (cd "$dir" && npm publish --tag '${{ steps.tag.outputs.tag }}' --provenance --access public)
            else
              echo "skipping $dir (no .node binary present)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cs2parser-native (loader)
        run: cd crates/native && npm publish --tag '${{ steps.tag.outputs.tag }}' --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cs2parser (main)
        run: npm publish --tag '${{ steps.tag.outputs.tag }}' --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
