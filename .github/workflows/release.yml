name: Release

# Pipeline (this file lives on the `rust` branch = the 2.x alpha line; `master`
# runs its own release.yml for the stable line):
#   1. `release-please` watches the rust branch for conventional commits. When a
#      release is "ready", it opens or updates a release PR. Merging that PR
#      creates a GitHub release + tag + emits `release_created` on the next run.
#      `prerelease: true` in release-please-config.json makes these `-alpha.N`
#      versions, which the publish job routes to the `alpha` dist-tag (so npm's
#      `latest` is never moved by an alpha).
#   2. On `release_created`, the `build` matrix produces per-triple .node
#      binaries and attaches them to that release as release assets via
#      `gh release upload`. Release assets (vs CI artefacts) are permanent,
#      visible in the GH UI, immune to artefact-action version drift, and
#      keep the binary co-located with the version tag for the lifetime of
#      the release.
#   3. `publish` downloads every release asset via `gh release download`,
#      syncs the new version across the loader + per-triple sub-package +
#      main package manifests, and pushes them to npm. The main `cs2parser`
#      package's `cs2parser-native` dependency picks the matching triple via
#      that loader's `optionalDependencies`.

on:
  push:
    branches: [rust]

# Releases are linear: never run two release pipelines for the same ref
# concurrently. `cancel-in-progress: false` ensures a release that's already
# uploading artefacts and publishing to npm can't be killed by the next push
# — a partial publish (some triples up, others not) would be ugly to clean up.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

env:
  APP_NAME: cs2parser-native

defaults:
  run:
    shell: bash

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          # Operate on whichever branch triggered the run (rust here), not the
          # repo default branch. Without this release-please always targets the
          # default branch and would try to release master on a rust push.
          target-branch: ${{ github.ref_name }}
          # No `release-type` input → manifest mode: release-please reads this
          # branch's release-please-config.json (`prerelease: true`,
          # `prerelease-type: alpha`) + .release-please-manifest.json. Passing
          # `release-type` can put it in simple mode and ignore that config,
          # which would cut a stable 2.0.0 onto the `latest` dist-tag.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  build:
    name: build-${{ matrix.settings.target }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        if: ${{ !matrix.settings.docker }}
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust toolchain
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/native/target
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('crates/native/Cargo.lock', 'crates/native/src/**', 'crates/native/build.rs') }}
          restore-keys: |
            ${{ matrix.settings.target }}-cargo-

      - name: Install deps (host)
        if: ${{ !matrix.settings.docker }}
        run: bun install --frozen-lockfile

      # Use `bun x` (not `npx`): bun workspaces hoist `napi` to the workspace
      # root's `node_modules/.bin/`, and `npx` from `crates/native` doesn't
      # see it — it falls back to the npm registry and fails with ENOVERSIONS
      # for the unrelated public `napi` package. `bun x` walks the workspace
      # tree and finds the hoisted bin.
      - name: Build (host)
        if: ${{ !matrix.settings.docker }}
        run: cd crates/native && bun x napi build --platform --release --target ${{ matrix.settings.target }}

      - name: Build (docker)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          # The `napi-rs/nodejs-rust:lts-*` images ship a Rust toolchain that's
          # behind current stable. `prost-build` pulls in `wit-bindgen-rust-macro`
          # which needs the `edition2024` feature (stable since Rust 1.85), so
          # refresh the toolchain before building.
          run: |
            rustup update stable && rustup default stable
            npm install --ignore-scripts
            cd crates/native && npx napi build --platform --release --target ${{ matrix.settings.target }}

      - name: Attach .node to GitHub release
        run: gh release upload "$TAG" crates/native/${APP_NAME}.*.node --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}

  publish:
    name: Publish to npm
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Download .node binaries from release
        run: |
          mkdir -p crates/native
          gh release download "$TAG" \
            --pattern "${APP_NAME}.*.node" \
            --dir crates/native/
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}

      - name: Move binaries into per-triple sub-package dirs
        run: |
          shopt -s nullglob
          for f in crates/native/${APP_NAME}.*.node; do
            base=$(basename "$f" .node)
            triple=${base#${APP_NAME}.}
            dest=crates/native/npm/$triple/
            if [ -d "$dest" ]; then
              mv "$f" "$dest"
              echo "  $triple ← $f"
            else
              echo "WARNING: no sub-package dir for triple '$triple', leaving $f in place"
            fi
          done

      - name: Sync package versions
        run: bun scripts/sync-package-versions.ts

      - name: Build main bundle
        run: bun run build

      # npm publish defaults to the `latest` dist-tag regardless of whether
      # the version has a `-alpha.N` / `-beta.N` / `-rc.N` suffix. Without an
      # explicit `--tag`, publishing 2.0.0-alpha.0 would point `latest` at the
      # alpha, breaking every `npm install cs2parser` that doesn't pin. Pick
      # the dist-tag from the version's pre-release identifier.
      - name: Determine npm dist-tag
        id: tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-alpha.*) TAG=alpha ;;
            *-beta.*)  TAG=beta ;;
            *-rc.*)    TAG=rc ;;
            *-*)       TAG=next ;;   # any other pre-release identifier
            *)         TAG=latest ;;
          esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "Publishing $VERSION → dist-tag '$TAG'"

      - name: Publish per-triple sub-packages
        run: |
          for dir in crates/native/npm/*/; do
            if [ -f "$dir/package.json" ] && ls "$dir"*.node >/dev/null 2>&1; then
              echo "publishing $dir"
              (cd "$dir" && npm publish --tag '${{ steps.tag.outputs.tag }}' --provenance --access public)
            else
              echo "skipping $dir (no .node binary present)"
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cs2parser-native (loader)
        run: cd crates/native && npm publish --tag '${{ steps.tag.outputs.tag }}' --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cs2parser (main)
        run: npm publish --tag '${{ steps.tag.outputs.tag }}' --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
