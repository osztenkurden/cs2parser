name: Benchmark

# Per-PR concurrency: a new push cancels the in-flight benchmark for the same
# branch. The benchmark only matters as a "what's the perf at the head of this
# PR" check, so older runs are pure waste.
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    paths:
      - 'src/**'
      - 'crates/native/**'
      - 'scripts/benchmark*.ts'
      - '.github/workflows/benchmark.yml'

jobs:
  benchmark:
    name: Performance Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/native/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/native/Cargo.lock', 'crates/native/src/**', 'crates/native/build.rs') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: bun install --frozen-lockfile

      - name: Build native addon
        run: bun run build:native

      - name: Build bundle
        run: bun run build

      # Cache demo fixtures
      - name: Cache test fixtures
        id: fixture-cache
        uses: actions/cache@v5
        with:
          path: tests/fixtures/*.dem
          key: test-fixtures-v1

      - name: Download test fixtures
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: |
          gh release download test-fixtures/v1 -p "*.dem" -D tests/fixtures/ --repo ${{ github.repository }} || echo "No test fixtures release found, skipping benchmark"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run benchmark
        id: bench
        run: |
          DEMO=$(ls tests/fixtures/*.dem 2>/dev/null | head -1)
          if [ -z "$DEMO" ]; then
            echo "No demo file found, skipping benchmark"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          bun --expose-gc scripts/benchmark.ts "$DEMO" | tee benchmark-output.txt

      - name: Comment benchmark results on PR
        if: steps.bench.outputs.skipped != 'true' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const benchmarkMd = fs.readFileSync('benchmark.md', 'utf8');
            const body = `## Benchmark Results\n\n${benchmarkMd}\n\n---\n*Auto-generated by CI*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('## Benchmark Results') && c.user.type === 'Bot');
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
