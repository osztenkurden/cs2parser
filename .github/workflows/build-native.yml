name: Build native

# Builds the per-platform `cs2parser-native` .node binaries on every push to
# master and on PRs that touch the Rust crate / its proto inputs / the build
# script. Regular code-only PRs skip this matrix entirely — `ci.yml` already
# validates the linux-x64 build inline.
#
# Artefacts uploaded here are NOT consumed by the release flow — see
# `release.yml` which runs its own matrix at publish time so the artefact ↔
# release coupling stays inside one workflow.
#
# Concurrency: on a PR, every new commit cancels any in-flight matrix for the
# same branch (saves ~6 × build-minutes per superseded commit). On master
# pushes we still cancel older runs — only the head-of-master result matters.
concurrency:
  group: build-native-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master]
    paths:
      - 'crates/native/**'
      - 'proto/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    branches: [master]
    paths:
      - 'crates/native/**'
      - 'proto/**'
      - '.github/workflows/build-native.yml'
  workflow_dispatch:

env:
  DEBUG: napi:*
  APP_NAME: cs2parser-native

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: bun run build:native
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: bun run build:native
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
            build: cd crates/native && npx napi build --platform --release --target x86_64-unknown-linux-musl
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
            build: cd crates/native && npx napi build --platform --release --target aarch64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
            build: bun run build:native
          - host: macos-latest
            target: aarch64-apple-darwin
            build: bun run build:native -- --target aarch64-apple-darwin
    name: ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        if: ${{ !matrix.settings.docker }}
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust toolchain
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/native/target
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('crates/native/Cargo.lock', 'crates/native/src/**', 'crates/native/build.rs') }}
          restore-keys: |
            ${{ matrix.settings.target }}-cargo-

      - name: Install deps (host)
        if: ${{ !matrix.settings.docker }}
        run: bun install --frozen-lockfile

      - name: Build (host)
        if: ${{ !matrix.settings.docker }}
        run: ${{ matrix.settings.build }}

      - name: Build (docker)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          run: |
            npm install --ignore-scripts
            ${{ matrix.settings.build }}

      - name: Upload .node artefact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.settings.target }}
          path: crates/native/${{ env.APP_NAME }}.*.node
          if-no-files-found: error
