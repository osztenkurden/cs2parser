name: Build native

# Builds the per-platform `cs2parser-native` .node binaries on every push to
# master and on PRs that touch the Rust crate / its proto inputs / the build
# script. Regular code-only PRs skip this matrix entirely — `ci.yml` already
# validates the linux-x64 build inline.
#
# Artefacts uploaded here are NOT consumed by the release flow — see
# `release.yml` which runs its own matrix at publish time so the artefact ↔
# release coupling stays inside one workflow.
#
# Concurrency: on a PR, every new commit cancels any in-flight matrix for the
# same branch (saves ~6 × build-minutes per superseded commit). On master
# pushes we still cancel older runs — only the head-of-master result matters.
concurrency:
  group: build-native-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [master]
    paths:
      - 'crates/native/**'
      - 'proto/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    branches: [master]
    paths:
      - 'crates/native/**'
      - 'proto/**'
      - '.github/workflows/build-native.yml'
  workflow_dispatch:

env:
  DEBUG: napi:*
  APP_NAME: cs2parser-native

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-alpine
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian-aarch64
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
    name: ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        if: ${{ !matrix.settings.docker }}
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Rust toolchain
        if: ${{ !matrix.settings.docker }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.settings.target }}

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/native/target
          key: ${{ matrix.settings.target }}-cargo-${{ hashFiles('crates/native/Cargo.lock', 'crates/native/src/**', 'crates/native/build.rs') }}
          restore-keys: |
            ${{ matrix.settings.target }}-cargo-

      - name: Install deps (host)
        if: ${{ !matrix.settings.docker }}
        run: bun install --frozen-lockfile

      # Always pass --target explicitly. `napi build` without it targets the
      # host triple, which is wrong for darwin: `macos-latest` is arm64, so
      # the `x86_64-apple-darwin` leg would otherwise produce an arm64 .node
      # and the artefact glob would fail to match.
      #
      # Use `bun x` (not `npx`): bun workspaces hoist `napi` to the workspace
      # root's `node_modules/.bin/`, and `npx` from `crates/native` doesn't
      # see it — it falls back to the npm registry and fails with ENOVERSIONS
      # for the unrelated public `napi` package. `bun x` walks the workspace
      # tree and finds the hoisted bin.
      - name: Build (host)
        if: ${{ !matrix.settings.docker }}
        run: cd crates/native && bun x napi build --platform --release --target ${{ matrix.settings.target }}

      - name: Build (docker)
        if: ${{ matrix.settings.docker }}
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.settings.docker }}
          options: -v ${{ github.workspace }}:/workspace -w /workspace
          # The `napi-rs/nodejs-rust:lts-*` images ship a Rust toolchain that's
          # behind current stable. `prost-build` pulls in `wit-bindgen-rust-macro`
          # which needs the `edition2024` feature (stable since Rust 1.85), so
          # refresh the toolchain before building.
          run: |
            rustup update stable && rustup default stable
            npm install --ignore-scripts
            cd crates/native && npx napi build --platform --release --target ${{ matrix.settings.target }}

      # No upload here — this workflow is a sanity check on PRs / master
      # pushes that touch Rust. The build succeeding is the signal; the
      # actual binaries used for releases come from `release.yml`'s matrix,
      # which attaches them to the GitHub release.
      - name: Confirm binary exists
        run: |
          shopt -s nullglob
          files=(crates/native/${APP_NAME}.*.node)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no .node binary produced"
            exit 1
          fi
          ls -la "${files[@]}"
